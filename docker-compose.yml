version: "3.9"

x-common-env: &common-env
  env_file: .env

services:

  # ── PostgreSQL + pgvector ────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ─────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── MinIO ────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── MinIO bucket initializer ──────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh /init-buckets.sh
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_VIDEOS: ${MINIO_BUCKET_VIDEOS}
      MINIO_BUCKET_FRAMES: ${MINIO_BUCKET_FRAMES}
    volumes:
      - ./infra/minio/init-buckets.sh:/init-buckets.sh:ro

  # ── Database migration ────────────────────────────────────────────────────
  db-migrate:
    build:
      context: ./migrations
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./src/shared:/app/src/shared:ro
    command: alembic -c alembic.ini upgrade head

  # ── FastAPI (API Service) ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    env_file: .env
    ports:
      - "8000:8000"

  # ── Celery Worker (GPU) ──────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: src/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    env_file: .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    volumes:
      - ./code/transnetv2-weights:/app/code/transnetv2-weights:ro
      - /tmp/gds_worker:/tmp/gds_worker

  # ── FalkorDB (Graph Database for GraphRAG) ───────────────────────────────
  falkordb:
    image: falkordb/falkordb:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "3000:3000"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Agentic Chatbot ───────────────────────────────────────────────────────
  chatbot:
    build:
      context: .
      dockerfile: src/chatbot/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      falkordb:
        condition: service_healthy
    env_file: .env
    ports:
      - "8001:8001"

  # ── Nginx reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - api
      - chatbot
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
  falkordb_data:
