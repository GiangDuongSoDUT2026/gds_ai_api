## RabbitMQ Configuration

# Persist messages to disk (important for GPU job queue)
queue_master_locator = min-masters

# Dead letter exchange for failed tasks
# Configured per-queue via Celery task_queues setting

# Connection tuning
heartbeat = 60
consumer_timeout = 3600000  # 1 hour (GPU tasks can take long)

# Resource limits
vm_memory_high_watermark.relative = 0.7
disk_free_limit.absolute = 2GB

# Management plugin
management.load_definitions = /etc/rabbitmq/definitions.json
